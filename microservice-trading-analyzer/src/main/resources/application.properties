# Настройки брокерского модуля
# Расстояние до ордера (в %), при котором ордер может быть отменён
broker.order-cancel-distance-percent=0.3
# Коэффициент деления депозита для расчёта допустимого риска на сделку (riskPerTrade = deposit / divisor)
broker.deposit-risk-divisor=40
# Минимальное количество минут ожидания перед открытием следующей позиции
broker.minutes-between-positions=60
# Максимальное количество убыточных позиций за последние 24 часа (при достижении лимита новые позиции не открываются)
broker.max-losing-positions-per-day=3

analysis.candle1m.enabled=true
analysis.candle1m.max-live-buffer-size=10000
analysis.candle1m.max-historical-buffer-size=10000

analysis.candle5m.enabled=false
analysis.candle5m.max-live-buffer-size=10000
analysis.candle5m.max-historical-buffer-size=10000

analysis.candle1h.enabled=false
analysis.candle1h.max-live-buffer-size=10000
analysis.candle1h.max-historical-buffer-size=10000

analysis.candle4h.enabled=true
analysis.candle4h.max-live-buffer-size=210
analysis.candle4h.max-historical-buffer-size=10000

analysis.candle1w.enabled=false
analysis.candle1w.max-live-buffer-size=40
analysis.candle1w.max-historical-buffer-size=10000

# REST Client для Trading Executor
quarkus.rest-client.trading-executor.url=${EXECUTOR_URL:http://localhost:8082}
quarkus.rest-client.trading-executor.scope=jakarta.inject.Singleton

# логирование
quarkus.log.level=INFO
# Настройки логирования по пакетам TRACE, DEBUG, INFO, WARN, ERROR
quarkus.log.category."artskif.trader.ai".level=WARN
quarkus.log.category."artskif.trader.analyzer".level=WARN
quarkus.log.category."artskif.trader.broker".level=DEBUG
quarkus.log.category."artskif.trader.buffer".level=WARN
quarkus.log.category."artskif.trader.candle".level=WARN
quarkus.log.category."artskif.trader.dto".level=WARN
quarkus.log.category."artskif.trader.entity".level=DEBUG
quarkus.log.category."artskif.trader.events".level=WARN
quarkus.log.category."artskif.trader.kafka".level=WARN
quarkus.log.category."artskif.trader.mapper".level=DEBUG
quarkus.log.category."artskif.trader.repository".level=DEBUG
quarkus.log.category."artskif.trader.resource".level=WARN
quarkus.log.category."artskif.trader.strategy".level=WARN
quarkus.log.console.enable=true
# Текстовый формат
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %X{requestId} %s%e%n

# Отключить Dev Services для Apicurio Registry
quarkus.apicurio-registry.devservices.enabled=false
# Отключить Dev Services для PostgreSQL (если используется)
quarkus.datasource.devservices.enabled=false
# Отключить Dev Services для Kafka (если используется)
quarkus.kafka.devservices.enabled=false
# Отключить все Dev Services глобально
quarkus.devservices.enabled=false