# Настройки брокерского модуля
# Расстояние до ордера (в %), при котором ордер может быть отменён
broker.order-cancel-distance-percent=0.4
# Минимальное расстояние между открытыми позициями (в % от цены), при котором может быть открыта новая позиция
broker.min-position-distance-percent=0.6
# Процент от депозита, используемый для расчёта допустимого риска на сделку (riskPerTrade = deposit * percent / 100)
broker.deposit-risk-percent=0.05
# Минимальное количество минут ожидания перед открытием следующей позиции
broker.minutes-between-positions=10
# Максимальное количество убыточных позиций за последние 24 часа (при достижении лимита новые позиции не открываются)
broker.max-losing-positions-per-day=20
# Включены ли торговые операции (для отключения торговли, но сохранения анализа и других функций)
broker.trading-enabled=false
# Глобальный флаг включения всех стратегий. Если false — ни одна стратегия не запустится
strategy.all-enabled=false

analysis.candle1m.enabled=true
analysis.candle1m.max-live-buffer-size=10000
analysis.candle1m.max-historical-buffer-size=1000000

analysis.candle5m.enabled=true
analysis.candle5m.max-live-buffer-size=10000
analysis.candle5m.max-historical-buffer-size=1000000

analysis.candle1h.enabled=true
analysis.candle1h.max-live-buffer-size=1000
analysis.candle1h.max-historical-buffer-size=1000000

analysis.candle4h.enabled=true
analysis.candle4h.max-live-buffer-size=250
analysis.candle4h.max-historical-buffer-size=1000000

analysis.candle1w.enabled=false
analysis.candle1w.max-live-buffer-size=40
analysis.candle1w.max-historical-buffer-size=1000000

# REST Client для Trading Executor
quarkus.rest-client.trading-executor.url=${EXECUTOR_URL:http://localhost:8082}
quarkus.rest-client.trading-executor.scope=jakarta.inject.Singleton

# логирование
quarkus.log.level=INFO
# Настройки логирования по пакетам TRACE, DEBUG, INFO, WARN, ERROR
quarkus.log.category."artskif.trader.ai".level=INFO
quarkus.log.category."artskif.trader.analyzer".level=INFO
quarkus.log.category."artskif.trader.broker.client".level=INFO
quarkus.log.category."artskif.trader.broker.manager".level=DEBUG
quarkus.log.category."artskif.trader.state".level=INFO
quarkus.log.category."artskif.trader.buffer".level=INFO
quarkus.log.category."artskif.trader.candle".level=INFO
quarkus.log.category."artskif.trader.dto".level=INFO
quarkus.log.category."artskif.trader.entity".level=INFO
quarkus.log.category."artskif.trader.events".level=INFO
quarkus.log.category."artskif.trader.kafka".level=INFO
quarkus.log.category."artskif.trader.mapper".level=INFO
quarkus.log.category."artskif.trader.repository".level=INFO
quarkus.log.category."artskif.trader.resource".level=INFO
quarkus.log.category."artskif.trader.strategy".level=DEBUG
quarkus.log.console.enable=true
# Текстовый формат
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %X{requestId} %s%e%n

# Отключить Dev Services для Apicurio Registry
quarkus.apicurio-registry.devservices.enabled=false
# Отключить Dev Services для PostgreSQL (если используется)
quarkus.datasource.devservices.enabled=false
# Отключить Dev Services для Kafka (если используется)
quarkus.kafka.devservices.enabled=false
# Отключить все Dev Services глобально
quarkus.devservices.enabled=false